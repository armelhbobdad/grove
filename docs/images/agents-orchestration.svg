<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 750" role="img" aria-label="An orchestrator agent reads a spec, creates three tasks, and watches three workers run in parallel">
  <defs>
    <style>
      .paper { fill: #eef0e6; }
      .paper-2 { fill: #e4e7d8; }
      .ink { fill: #18241e; }
      .ink-2 { fill: #3a4a40; }
      .ink-3 { fill: #6b7266; }
      .moss { fill: #2d4a2d; }
      .moss-bright { fill: #3f6b3f; }
      .coral { fill: #c4543a; }
      .serif { font-family: 'Fraunces', serif; font-variation-settings: "opsz" 144, "SOFT" 30; font-weight: 500; }
      .serif-it { font-family: 'Fraunces', serif; font-style: italic; font-weight: 400; }
      .sans { font-family: 'Inter', -apple-system, sans-serif; font-weight: 500; }
      .mono { font-family: 'JetBrains Mono', monospace; font-weight: 500; }
      .flow { stroke: #3f6b3f; stroke-width: 2; fill: none; }
      .flow-back { stroke: #c4543a; stroke-width: 1.8; fill: none; stroke-dasharray: 4 4; }
    </style>
    <marker id="ao-arrow-fwd" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#3f6b3f"/>
    </marker>
    <marker id="ao-arrow-back" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#c4543a"/>
    </marker>
  </defs>

  <rect class="paper" width="1000" height="750"/>

  <text class="mono ink-3" x="40" y="44" font-size="11" letter-spacing="2">§ ORCHESTRATION · ONE DRIVES MANY</text>

  <!-- ===== Orchestrator (top-center) ===== -->
  <g transform="translate(350, 90)">
    <rect width="300" height="110" rx="10" fill="#eef0e6" stroke="#2d4a2d" stroke-width="2"/>
    <circle cx="44" cy="44" r="18" fill="#d77757"/>
    <text class="mono" x="44" y="48" font-size="12" text-anchor="middle" fill="#eef0e6" font-weight="700">C</text>
    <text class="serif moss" x="70" y="42" font-size="20">Orchestrator</text>
    <text class="mono ink-3" x="70" y="60" font-size="11">Claude Code  ·  MCP client</text>
    <rect x="24" y="76" width="252" height="20" rx="3" fill="#e4e7d8"/>
    <text class="mono ink-2" x="34" y="90" font-size="10.5">▸ reads spec.md · plans · dispatches</text>
  </g>

  <!-- Dispatch label -->
  <text class="mono moss-bright" x="500" y="230" font-size="11" text-anchor="middle" letter-spacing="1.5">grove_create_task  ·  grove_send_prompt</text>

  <!-- ===== Three worker branches ===== -->
  <!-- Worker 1: auth-refactor / Cursor -->
  <path class="flow" marker-end="url(#ao-arrow-fwd)" d="M 500 200 C 500 250, 250 260, 180 330"/>
  <!-- Worker 2: perf-hotfix / Codex -->
  <path class="flow" marker-end="url(#ao-arrow-fwd)" d="M 500 200 L 500 330"/>
  <!-- Worker 3: landing-copy / Gemini -->
  <path class="flow" marker-end="url(#ao-arrow-fwd)" d="M 500 200 C 500 250, 750 260, 820 330"/>

  <!-- Worker card 1 -->
  <g transform="translate(60, 340)">
    <rect width="240" height="160" rx="8" fill="#eef0e6" stroke="#c9ccbd" stroke-width="1.5"/>
    <circle cx="28" cy="30" r="11" fill="#111"/>
    <text class="mono" x="28" y="34" font-size="10" text-anchor="middle" fill="#eef0e6">⌘</text>
    <text class="serif ink" x="50" y="28" font-size="16">Worker · Cursor</text>
    <text class="mono ink-3" x="50" y="44" font-size="10">auth-refactor · busy</text>
    <rect x="20" y="60" width="200" height="6" rx="2" fill="#a9ae9c"/>
    <rect x="20" y="72" width="170" height="6" rx="2" fill="#a9ae9c"/>
    <rect x="20" y="84" width="190" height="6" rx="2" fill="#a9ae9c"/>
    <rect x="20" y="96" width="130" height="6" rx="2" fill="#a9ae9c"/>
    <!-- streaming dots -->
    <circle cx="30" cy="128" r="3" class="moss-bright"/>
    <circle cx="42" cy="128" r="3" class="moss-bright" opacity="0.6"/>
    <circle cx="54" cy="128" r="3" class="moss-bright" opacity="0.3"/>
    <text class="mono ink-3" x="66" y="132" font-size="10">streaming…</text>
  </g>

  <!-- Worker card 2 -->
  <g transform="translate(380, 340)">
    <rect width="240" height="160" rx="8" fill="#eef0e6" stroke="#c9ccbd" stroke-width="1.5"/>
    <circle cx="28" cy="30" r="11" fill="#111"/>
    <text class="mono" x="28" y="34" font-size="10" text-anchor="middle" fill="#eef0e6">◯</text>
    <text class="serif ink" x="50" y="28" font-size="16">Worker · Codex</text>
    <text class="mono ink-3" x="50" y="44" font-size="10">perf-hotfix · busy</text>
    <rect x="20" y="60" width="200" height="6" rx="2" fill="#a9ae9c"/>
    <rect x="20" y="72" width="150" height="6" rx="2" fill="#a9ae9c"/>
    <rect x="20" y="84" width="180" height="6" rx="2" fill="#a9ae9c"/>
    <rect x="20" y="96" width="120" height="6" rx="2" fill="#a9ae9c"/>
    <circle cx="30" cy="128" r="3" class="moss-bright"/>
    <circle cx="42" cy="128" r="3" class="moss-bright" opacity="0.6"/>
    <circle cx="54" cy="128" r="3" class="moss-bright" opacity="0.3"/>
    <text class="mono ink-3" x="66" y="132" font-size="10">streaming…</text>
  </g>

  <!-- Worker card 3 -->
  <g transform="translate(700, 340)">
    <rect width="240" height="160" rx="8" fill="#eef0e6" stroke="#c9ccbd" stroke-width="1.5"/>
    <circle cx="28" cy="30" r="11" fill="#4285f4"/>
    <text class="mono" x="28" y="34" font-size="10" text-anchor="middle" fill="#eef0e6">✦</text>
    <text class="serif ink" x="50" y="28" font-size="16">Worker · Gemini</text>
    <text class="mono ink-3" x="50" y="44" font-size="10">landing-copy · done ✓</text>
    <rect x="20" y="60" width="200" height="6" rx="2" fill="#a9ae9c"/>
    <rect x="20" y="72" width="160" height="6" rx="2" fill="#a9ae9c"/>
    <rect x="20" y="84" width="190" height="6" rx="2" fill="#a9ae9c"/>
    <rect x="20" y="96" width="100" height="6" rx="2" fill="#a9ae9c"/>
    <rect x="20" y="120" width="200" height="22" rx="4" fill="#dfe5d0"/>
    <text class="mono moss" x="30" y="135" font-size="10">✓ ready for review</text>
  </g>

  <!-- ===== Return arrows (workers → orchestrator) ===== -->
  <path class="flow-back" marker-end="url(#ao-arrow-back)" d="M 180 500 C 180 580, 400 620, 480 620 L 500 620"/>
  <path class="flow-back" marker-end="url(#ao-arrow-back)" d="M 500 500 L 500 620"/>
  <path class="flow-back" marker-end="url(#ao-arrow-back)" d="M 820 500 C 820 580, 600 620, 520 620 L 500 620"/>

  <!-- Results aggregation ring -->
  <g transform="translate(350, 600)">
    <rect width="300" height="100" rx="10" fill="#eef0e6" stroke="#c4543a" stroke-width="1.5"/>
    <text class="serif coral" x="150" y="36" font-size="18" text-anchor="middle">Results stream back</text>
    <text class="serif-it ink-3" x="150" y="60" font-size="13" text-anchor="middle">last_message, plan, chat_status</text>
    <text class="mono ink-3" x="150" y="84" font-size="10" text-anchor="middle">orchestrator decides what to do next</text>
  </g>

  <!-- Legend -->
  <g transform="translate(40, 710)">
    <line x1="0" y1="0" x2="30" y2="0" class="flow"/>
    <text class="mono ink-3" x="38" y="4" font-size="10">dispatch</text>
    <line x1="120" y1="0" x2="150" y2="0" class="flow-back"/>
    <text class="mono ink-3" x="158" y="4" font-size="10">return</text>
  </g>
</svg>
