<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 750" role="img" aria-label="MCP flow: orchestrator agents manage Grove; Grove injects MCP tools into worker agents">
  <defs>
    <style>
      .paper { fill: #eef0e6; }
      .paper-2 { fill: #e4e7d8; }
      .ink { fill: #18241e; }
      .ink-2 { fill: #3a4a40; }
      .ink-3 { fill: #6b7266; }
      .moss { fill: #2d4a2d; }
      .moss-bright { fill: #3f6b3f; }
      .coral { fill: #c4543a; }
      .line { stroke: #c9ccbd; stroke-width: 1.5; fill: none; }
      .arrow-moss { stroke: #3f6b3f; stroke-width: 2; fill: none; }
      .arrow-coral { stroke: #c4543a; stroke-width: 2; fill: none; }
      .serif { font-family: 'Fraunces', serif; font-variation-settings: "opsz" 144, "SOFT" 30; font-weight: 500; }
      .serif-it { font-family: 'Fraunces', serif; font-style: italic; font-weight: 400; }
      .sans { font-family: 'Inter', -apple-system, sans-serif; font-weight: 500; }
      .mono { font-family: 'JetBrains Mono', monospace; font-weight: 500; }
    </style>
    <marker id="arrow-m" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#3f6b3f"/>
    </marker>
    <marker id="arrow-c" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#c4543a"/>
    </marker>
  </defs>

  <rect class="paper" width="1000" height="750"/>

  <text class="mono ink-3" x="40" y="40" font-size="11" letter-spacing="2">§ MCP · BOTH DIRECTIONS</text>

  <!-- ============== LANE 1: Orchestrator → Grove (management) ============== -->
  <g transform="translate(0, 70)">
    <text class="mono ink-3" x="40" y="24" font-size="10" letter-spacing="2">01 · ORCHESTRATION</text>
    <text class="serif-it ink-2" x="40" y="52" font-size="16">An agent drives Grove.</text>

    <!-- Orchestrator box -->
    <g transform="translate(40, 90)">
      <rect width="200" height="90" rx="8" fill="#eef0e6" stroke="#2d4a2d" stroke-width="1.5"/>
      <text class="serif moss" x="100" y="38" font-size="18" text-anchor="middle">Orchestrator</text>
      <text class="mono ink-3" x="100" y="62" font-size="11" text-anchor="middle">Claude · Codex</text>
      <text class="serif-it ink-3" x="100" y="78" font-size="12" text-anchor="middle">any MCP client</text>
    </g>

    <!-- Arrow + tool list -->
    <g transform="translate(260, 135)">
      <path class="arrow-moss" marker-end="url(#arrow-m)" d="M 0 0 H 440"/>
      <text class="mono moss-bright" x="220" y="-38" font-size="11" text-anchor="middle" letter-spacing="1">grove_* tools</text>
      <text class="mono ink-2" x="8" y="-18" font-size="10.5">list_projects · list_tasks</text>
      <text class="mono ink-2" x="8" y="-4" font-size="10.5">create_task · edit_note</text>
      <text class="mono ink-2" x="8" y="24" font-size="10.5">start_chat · send_prompt</text>
      <text class="mono ink-2" x="8" y="38" font-size="10.5">chat_status · list_chats</text>
    </g>

    <!-- Grove receiver -->
    <g transform="translate(740, 90)">
      <rect width="220" height="90" rx="8" class="moss"/>
      <text class="serif" x="110" y="38" font-size="20" text-anchor="middle" fill="#eef0e6">Grove</text>
      <text class="mono" x="110" y="62" font-size="11" text-anchor="middle" fill="#c8d3bf">MCP server</text>
      <text class="serif-it" x="110" y="78" font-size="12" text-anchor="middle" fill="#c8d3bf">the conductor</text>
    </g>
  </g>

  <!-- Divider -->
  <line x1="80" y1="370" x2="920" y2="370" class="line" stroke-dasharray="2 5"/>

  <!-- ============== LANE 2: Grove → Worker (execution injection) ============== -->
  <g transform="translate(0, 400)">
    <text class="mono ink-3" x="40" y="24" font-size="10" letter-spacing="2">02 · INJECTION</text>
    <text class="serif-it ink-2" x="40" y="52" font-size="16">Grove gives every worker tools.</text>

    <!-- Grove left -->
    <g transform="translate(40, 90)">
      <rect width="220" height="90" rx="8" class="moss"/>
      <text class="serif" x="110" y="38" font-size="20" text-anchor="middle" fill="#eef0e6">Grove</text>
      <text class="mono" x="110" y="62" font-size="11" text-anchor="middle" fill="#c8d3bf">per-task session</text>
      <text class="serif-it" x="110" y="78" font-size="12" text-anchor="middle" fill="#c8d3bf">the context</text>
    </g>

    <!-- Arrow with injected tools -->
    <g transform="translate(280, 135)">
      <path class="arrow-coral" marker-end="url(#arrow-c)" d="M 0 0 H 420"/>
      <text class="mono coral" x="210" y="-38" font-size="11" text-anchor="middle" letter-spacing="1">injected tools</text>
      <text class="mono ink-2" x="8" y="-18" font-size="10.5">sketch_read_me · list</text>
      <text class="mono ink-2" x="8" y="-4" font-size="10.5">sketch_read · sketch_draw</text>
      <text class="mono ink-2" x="8" y="24" font-size="10.5">review comments · notes</text>
      <text class="mono ink-2" x="8" y="38" font-size="10.5">task context · env vars</text>
    </g>

    <!-- Worker box -->
    <g transform="translate(720, 90)">
      <rect width="240" height="90" rx="8" fill="#eef0e6" stroke="#c4543a" stroke-width="1.5"/>
      <text class="serif coral" x="120" y="38" font-size="18" text-anchor="middle">Worker agent</text>
      <text class="mono ink-3" x="120" y="62" font-size="11" text-anchor="middle">Claude · Cursor · Gemini</text>
      <text class="serif-it ink-3" x="120" y="78" font-size="12" text-anchor="middle">doing the work</text>
    </g>
  </g>

  <!-- Footer note -->
  <text class="serif-it ink-3" x="500" y="720" font-size="14" text-anchor="middle">Both sides of the MCP conversation, configured for you.</text>
</svg>
